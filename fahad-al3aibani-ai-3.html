<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذكاء اصطناعي | فهد العيباني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C; --gold-dim: #7A5F28;
    --sand: #F5EDD6; --ink: #1A1208;
    --charcoal: #2E2416; --mist: #EDE4CC;
  }
  body { background: var(--ink); color: var(--sand); font-family: 'Tajawal', sans-serif; min-height: 100vh; }
  header { text-align: center; padding: 48px 24px 32px; border-bottom: 1px solid var(--gold-dim); }
  .ornament { font-family: 'Amiri', serif; color: var(--gold); font-size: 22px; letter-spacing: 8px; opacity: 0.7; display: block; margin-bottom: 16px; }
  h1 { font-family: 'Amiri', serif; font-size: clamp(28px, 6vw, 52px); font-weight: 700; color: var(--gold); line-height: 1.2; }
  .subtitle { font-size: 13px; color: var(--gold-dim); letter-spacing: 3px; margin-top: 10px; font-weight: 500; }
  main { max-width: 780px; margin: 0 auto; padding: 40px 20px 60px; }
  .card { background: linear-gradient(145deg, #221A0A, #1A1208); border: 1px solid var(--gold-dim); border-radius: 4px; padding: 32px; margin-bottom: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .field-label { font-size: 11px; letter-spacing: 2.5px; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .field-group { margin-bottom: 22px; }
  textarea, select, input[type=text], input[type=password] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--gold-dim); border-radius: 2px; color: var(--sand); font-family: 'Tajawal', sans-serif; font-size: 15px; padding: 12px 16px; resize: vertical; outline: none; transition: border-color 0.2s; }
  textarea:focus, select:focus, input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
  textarea { min-height: 80px; }
  select option { background: var(--charcoal); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:520px){ .row { grid-template-columns: 1fr; } }

  /* eleven section */
  .eleven-section { border-top: 1px solid var(--gold-dim); padding-top: 20px; margin-top: 4px; }
  .eleven-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; }
  .toggle-icon { font-size: 18px; }
  .toggle-label { font-size: 13px; color: var(--gold); font-weight: 600; }
  .toggle-badge { background: rgba(201,168,76,0.12); border: 1px solid var(--gold-dim); color: var(--gold-dim); font-size: 10px; padding: 2px 8px; border-radius: 10px; letter-spacing: 1px; }
  .eleven-fields { display: none; }
  .eleven-fields.open { display: block; }
  .hint { font-size: 11px; color: var(--gold-dim); margin-top: 6px; line-height: 1.6; }
  .hint a { color: var(--gold); }

  .btn-generate { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold-dim), var(--gold), #A07830); border: none; border-radius: 2px; color: var(--ink); font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 2px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
  .btn-generate:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.4); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-generate .shimmer { position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%); transform: translateX(-100%); animation: shimmer 1.6s infinite; display: none; }
  .btn-generate.loading .shimmer { display: block; }
  @keyframes shimmer { to { transform: translateX(100%); } }

  .result-wrap { display: none; animation: fadeUp 0.5s ease; }
  .result-wrap.visible { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .result-title { font-size: 11px; letter-spacing: 3px; color: var(--gold); font-weight: 700; text-transform: uppercase; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-action { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold-dim); padding: 6px 14px; font-family: 'Tajawal', sans-serif; font-size: 12px; border-radius: 2px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .btn-action:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

  .nasheed-text { font-family: 'Amiri', serif; font-size: clamp(17px, 2.5vw, 20px); line-height: 2.1; color: var(--mist); white-space: pre-wrap; text-align: center; padding: 32px 24px; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,0.15); border-radius: 2px; }
  .nasheed-text::before, .nasheed-text::after { content: '❧'; display: block; color: var(--gold); opacity: 0.4; font-size: 22px; text-align: center; margin: 0 0 12px; }
  .nasheed-text::after { margin: 12px 0 0; }

  .audio-wrap { margin-top: 16px; display: none; }
  .audio-wrap.visible { display: block; }
  audio { width: 100%; border-radius: 2px; }

  .tts-status { font-size: 12px; color: var(--gold-dim); text-align: center; margin-top: 8px; min-height: 18px; }

  .spinner { display: none; text-align: center; padding: 40px; color: var(--gold-dim); font-size: 13px; letter-spacing: 2px; }
  .spinner.visible { display: block; }
  .spinner-ring { width: 36px; height: 36px; border: 2px solid var(--gold-dim); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { display: none; color: #E06060; font-size: 13px; text-align: center; padding: 16px; border: 1px solid #5A1A1A; border-radius: 2px; background: rgba(139,26,26,0.1); margin-top: 16px; }
  .error-msg.visible { display: block; }

  footer { text-align: center; padding: 24px; border-top: 1px solid var(--gold-dim); color: var(--gold-dim); font-size: 11px; letter-spacing: 2px; }
</style>
</head>
<body>

<header>
  <span class="ornament">﷽</span>
  <h1>ذكاء اصطناعي<br>بأسلوب فهد العيباني</h1>
  <p class="subtitle">كتابة الشيلات · وتحويلها لصوت</p>
</header>

<main>
  <div class="card">
    <div class="field-group">
      <label class="field-label">موضوع الشيلة</label>
      <textarea id="topic" placeholder="مثال: الشوق للوطن، الوفاء للصديق، مدح الأم..."></textarea>
    </div>

    <div class="row">
      <div class="field-group">
        <label class="field-label">نوع الشيلة</label>
        <select id="type">
          <option value="عاطفية">عاطفية / حنين</option>
          <option value="وطنية">وطنية / فخر</option>
          <option value="مدح">مدح وإطراء</option>
          <option value="دينية">دينية / روحانية</option>
          <option value="فراق">فراق وغياب</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">طول الشيلة</label>
        <select id="length">
          <option value="قصيرة (مقطعان)">قصيرة — مقطعان</option>
          <option value="متوسطة (3 مقاطع)" selected>متوسطة — 3 مقاطع</option>
          <option value="طويلة (4 مقاطع)">طويلة — 4 مقاطع</option>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">كلمات أو أفكار تودّ تضمينها (اختياري)</label>
      <input type="text" id="keywords" placeholder="مثال: السماء، النخيل، الليل، الأهل...">
    </div>

    <!-- ElevenLabs optional -->
    <div class="eleven-section">
      <div class="eleven-toggle" onclick="toggleEleven()">
        <span class="toggle-icon">🔊</span>
        <span class="toggle-label">تحويل الشيلة لصوت (ElevenLabs)</span>
        <span class="toggle-badge">اختياري</span>
        <span id="toggleArrow" style="color:var(--gold-dim); margin-right:auto;">▼</span>
      </div>
      <div class="eleven-fields" id="elevenFields">
        <div class="field-group">
          <label class="field-label">ElevenLabs API Key</label>
          <input type="password" id="elevenKey" placeholder="sk_...">
          <p class="hint">احصلي على مفتاح مجاني من <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> ← الدليل المصوّر موجود بالأعلى</p>
        </div>
        <div class="field-group">
          <label class="field-label">الصوت</label>
          <select id="elevenVoice">
            <option value="nPczCjzI2devNBz1zQrb">Brian — الأفضل للعربية</option>
            <option value="onwK4e9ZLuTAKqWW03F9">Daniel</option>
            <option value="N2lVS1w4EtoT3dr4eOWO">Callum</option>
            <option value="XB0fDUnXU5powFXDhCwa">Charlotte</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateNasheed()">
      <span class="shimmer"></span>
      ✦ اكتب الشيلة
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Result -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-header">
      <span class="result-title">✦ الشيلة</span>
      <div class="actions">
        <button class="btn-action" onclick="copyText()">نسخ</button>
        <button class="btn-action" id="speakBtn" onclick="speakElevenLabs()" disabled>🔊 استمع</button>
      </div>
    </div>

    <div class="spinner" id="spinner">
      <div class="spinner-ring"></div>
      جارٍ كتابة الشيلة…
    </div>

    <div class="nasheed-text" id="nasheedText"></div>
    <div class="tts-status" id="ttsStatus"></div>
    <div class="audio-wrap" id="audioWrap">
      <audio id="audioPlayer" controls></audio>
    </div>
  </div>
</main>

<footer>صُمِّم بالذكاء الاصطناعي · بأسلوب فهد العيباني</footer>

<script>
let lastText = '';
let elevenOpen = false;

function toggleEleven() {
  elevenOpen = !elevenOpen;
  document.getElementById('elevenFields').classList.toggle('open', elevenOpen);
  document.getElementById('toggleArrow').textContent = elevenOpen ? '▲' : '▼';
}

async function generateNasheed() {
  const topic    = document.getElementById('topic').value.trim();
  const type     = document.getElementById('type').value;
  const length   = document.getElementById('length').value;
  const keywords = document.getElementById('keywords').value.trim();
  const btn      = document.getElementById('generateBtn');
  const spinner  = document.getElementById('spinner');
  const result   = document.getElementById('resultWrap');
  const textEl   = document.getElementById('nasheedText');
  const errEl    = document.getElementById('errorMsg');
  const speakBtn = document.getElementById('speakBtn');

  if (!topic) {
    errEl.textContent = 'من فضلك اكتب موضوع الشيلة أولاً.';
    errEl.classList.add('visible');
    return;
  }

  errEl.classList.remove('visible');
  btn.disabled = true;
  btn.classList.add('loading');
  result.classList.add('visible');
  spinner.classList.add('visible');
  textEl.textContent = '';
  speakBtn.disabled = true;
  document.getElementById('audioWrap').classList.remove('visible');
  document.getElementById('ttsStatus').textContent = '';

  const prompt = `أنت منشد ومؤلف كلمات خليجي بأسلوب فهد العيباني تماماً.

فهد العيباني يتميز بـ:
- الأسلوب الخليجي الأصيل (كويتي / سعودي)
- الجمل العاطفية العميقة مع لمسة بدوية
- السجع والموسيقى الداخلية في الكلمات
- استخدام صور الصحراء والسماء والليل والهوى
- الكلمات تبدأ عادةً بنداء أو مخاطبة عاطفية

اكتب شيلة ${length} عن موضوع: "${topic}"
النوع: ${type}
${keywords ? 'الكلمات والأفكار المطلوب تضمينها: ' + keywords : ''}

اكتب فقط كلمات الشيلة بشكل شعري منسّق، بدون أي شرح أو عناوين. فقط الكلمات الشعرية مرتبة في أسطر.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) throw new Error('فشل الاتصال — كود: ' + response.status);

    const data = await response.json();
    lastText = data.content.map(b => b.text || '').join('');
    spinner.classList.remove('visible');
    textEl.textContent = lastText;

    const hasKey = document.getElementById('elevenKey').value.trim();
    speakBtn.disabled = !hasKey;
    if (!hasKey) {
      document.getElementById('ttsStatus').textContent = 'لتسمع الشيلة: افتح قسم الصوت وأدخل مفتاح ElevenLabs';
    }

  } catch (err) {
    spinner.classList.remove('visible');
    errEl.textContent = 'حدث خطأ: ' + err.message;
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

async function speakElevenLabs() {
  const key   = document.getElementById('elevenKey').value.trim();
  const voice = document.getElementById('elevenVoice').value;
  const status = document.getElementById('ttsStatus');

  if (!key) { status.textContent = '⚠️ أدخلي ElevenLabs API Key أولاً'; return; }
  if (!lastText) { status.textContent = '⚠️ اكتبي الشيلة أولاً'; return; }

  status.textContent = '⏳ جارٍ توليد الصوت…';
  document.getElementById('speakBtn').disabled = true;

  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
      method: 'POST',
      headers: { 'xi-api-key': key, 'Content-Type': 'application/json', 'Accept': 'audio/mpeg' },
      body: JSON.stringify({
        text: lastText,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail?.message || 'تحقق من صحة المفتاح');
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const player = document.getElementById('audioPlayer');
    player.src = url;
    document.getElementById('audioWrap').classList.add('visible');
    player.play();
    status.textContent = '✓ الصوت جاهز!';

  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    document.getElementById('speakBtn').disabled = false;
  }
}

function copyText() {
  if (!lastText) return;
  navigator.clipboard.writeText(lastText).then(() => {
    const btn = document.querySelector('[onclick="copyText()"]');
    btn.textContent = '✓ تم';
    setTimeout(() => btn.textContent = 'نسخ', 2000);
  });
}
</script>
</body>
</html>
